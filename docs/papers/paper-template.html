<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title$ — JAPL Research</title>
  <meta name="description" content="$title$ — Part of the JAPL programming language research series.">

  <!-- Open Graph -->
  <meta property="og:type" content="article">
  <meta property="og:title" content="$title$ — JAPL Research">
  <meta property="og:description" content="Part of the JAPL programming language research series. Just Another Programming Language.">
  <meta property="og:url" content="https://japl-nine.vercel.app/papers/$basename$.html">
  <meta property="og:image" content="https://japl-nine.vercel.app/og-image.png">
  <meta property="og:site_name" content="JAPL">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="$title$ — JAPL Research">
  <meta name="twitter:description" content="Part of the JAPL programming language research series.">
  <meta name="twitter:image" content="https://japl-nine.vercel.app/og-image.png">

  <!-- KaTeX for math -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      if (typeof renderMathInElement !== "undefined") {
        renderMathInElement(document.body, {
          delimiters: [
            {left: "\\[", right: "\\]", display: true},
            {left: "\\(", right: "\\)", display: false}
          ]
        });
      }
    });
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e17;
      --surface: #141922;
      --surface-2: #1a1f2e;
      --accent: #7c5cfc;
      --accent-dim: rgba(124, 92, 252, 0.15);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --dim: #64748b;
      --code-bg: #1a1f2e;
      --border: #1e293b;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 17px;
    }

    /* Top bar */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 14, 23, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar a { color: var(--muted); text-decoration: none; font-size: 0.9rem; }
    .topbar a:hover { color: var(--accent); }
    .topbar .logo { color: var(--text); font-weight: 700; font-size: 1.1rem; }
    .topbar .logo span { color: var(--accent); }
    .topbar-links { display: flex; gap: 1.5rem; }

    /* Layout */
    .wrapper {
      display: flex;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* Sidebar TOC */
    .sidebar {
      position: sticky;
      top: 60px;
      width: 260px;
      min-width: 260px;
      height: calc(100vh - 60px);
      overflow-y: auto;
      padding: 2rem 1rem 2rem 2rem;
      border-right: 1px solid var(--border);
    }
    .sidebar h4 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--dim);
      margin-bottom: 1rem;
    }
    .sidebar ul { list-style: none; }
    .sidebar li { margin-bottom: 0.4rem; }
    .sidebar a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.85rem;
      line-height: 1.4;
      display: block;
      padding: 0.2rem 0;
      transition: color 0.2s;
    }
    .sidebar a:hover { color: var(--accent); }
    .sidebar .toc-h3 { padding-left: 1rem; font-size: 0.8rem; }

    /* Main content */
    .content {
      flex: 1;
      min-width: 0;
      padding: 2.5rem 3rem 4rem;
      max-width: 800px;
    }

    /* Paper header */
    .paper-header {
      margin-bottom: 3rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid var(--border);
    }
    .paper-part {
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }
    .paper-header h1 {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 1rem;
    }
    .paper-author {
      color: var(--muted);
      font-size: 0.95rem;
    }
    .paper-links-bar {
      margin-top: 1rem;
      display: flex;
      gap: 1rem;
    }
    .paper-links-bar a {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.85rem;
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--accent);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .paper-links-bar a:hover {
      background: var(--accent-dim);
    }

    /* Typography */
    h1, h2, h3, h4, h5, h6 {
      color: var(--text);
      margin-top: 2.5rem;
      margin-bottom: 1rem;
      line-height: 1.3;
    }
    h2 { font-size: 1.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; }
    h3 { font-size: 1.2rem; color: var(--muted); }
    h4 { font-size: 1.05rem; }
    p { margin-bottom: 1rem; }
    a { color: var(--accent); }

    /* Abstract */
    .abstract {
      background: var(--surface);
      border-left: 3px solid var(--accent);
      padding: 1.5rem;
      border-radius: 0 8px 8px 0;
      margin-bottom: 2rem;
    }
    .abstract p { margin-bottom: 0; }

    /* Code */
    pre, code {
      font-family: 'JetBrains Mono', monospace;
    }
    code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-size: 0.88em;
    }
    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      line-height: 1.5;
      font-size: 0.88rem;
    }
    pre code {
      background: none;
      padding: 0;
      border-radius: 0;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.92rem;
    }
    th, td {
      padding: 0.6rem 0.8rem;
      border: 1px solid var(--border);
      text-align: left;
    }
    th {
      background: var(--surface);
      font-weight: 600;
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    tr:nth-child(even) { background: rgba(20, 25, 34, 0.5); }

    /* Lists */
    ul, ol { margin: 1rem 0; padding-left: 1.5rem; }
    li { margin-bottom: 0.4rem; }

    /* Blockquote */
    blockquote {
      border-left: 3px solid var(--accent);
      padding-left: 1rem;
      color: var(--muted);
      margin: 1.5rem 0;
    }

    /* Figures */
    figure { margin: 2rem 0; text-align: center; }
    figcaption { color: var(--dim); font-size: 0.85rem; margin-top: 0.5rem; }

    /* Math */
    .math.display { overflow-x: auto; padding: 0.5rem 0; }

    /* Responsive */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .content { padding: 1.5rem; }
      .topbar { padding: 0.75rem 1rem; }
    }

    /* Footer */
    .paper-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--dim);
      font-size: 0.85rem;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="topbar">
  <a href="../index.html" class="logo">JAPL<span>.</span></a>
  <div class="topbar-links">
    <a href="../index.html#papers">All Papers</a>
    <a href="pdf/$basename$.pdf">Download PDF</a>
    <a href="https://github.com/YonedaAI/japl" target="_blank">GitHub</a>
  </div>
</div>

<div class="wrapper">
  <nav class="sidebar" id="sidebar">
    <h4>Contents</h4>
    <ul id="toc"></ul>
  </nav>

  <main class="content">
    <div class="paper-header">
      <div class="paper-part">$part$</div>
      <h1>$title$</h1>
      <div class="paper-author">Matthew Long — The JAPL Research Collaboration<br>YonedaAI Research Collective, Chicago, IL</div>
      <div class="paper-links-bar">
        <a href="pdf/$basename$.pdf">PDF</a>
        <a href="latex/$basename$.tex">LaTeX Source</a>
        <a href="../index.html#papers">Series Index</a>
      </div>
    </div>

    $body$

    <div class="paper-footer">
      <p>JAPL Research Series — YonedaAI Research Collective</p>
      <p><a href="../index.html">japl-nine.vercel.app</a></p>
    </div>
  </main>
</div>

<script>
// Auto-generate sidebar TOC from h2/h3 headings
const toc = document.getElementById('toc');
const headings = document.querySelectorAll('.content h2, .content h3');
headings.forEach((h, i) => {
  if (!h.id) h.id = 'section-' + i;
  const li = document.createElement('li');
  const a = document.createElement('a');
  a.href = '#' + h.id;
  a.textContent = h.textContent;
  if (h.tagName === 'H3') a.className = 'toc-h3';
  li.appendChild(a);
  toc.appendChild(li);
});
</script>

</body>
</html>
